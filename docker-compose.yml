services:
  postgres:
    image: postgres:16-alpine
    container_name: petshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: PetShopManager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - petshop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d PetShopManager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  petshop_pgdata:
